  player_veto_green_blue_delta: 4
  player_veto_min_pixels: 8
  player_veto_min_width_px: 12
  player_veto_max_height_px: 24
  ice_mob_signature_enabled: true
  ice_mob_min_blue: 135
  ice_mob_min_green: 105
  ice_mob_min_brightness: 118
