app:
  name: "botlab-live-real-mvp"
  mode: "live"

cycle:
  interval_s: 45.0
  prepare_before_s: 5.0
  ready_before_s: 1.0
  ready_after_s: 1.0
  verify_timeout_s: 0.5
  recover_timeout_s: 2.0

combat:
  low_hp_threshold: 0.35
  rest_start_threshold: 0.50
  rest_stop_threshold: 0.90
  default_profile_name: "basic_farmer"

telemetry:
  sqlite_path: "data/telemetry/live_real_mvp.sqlite3"
  log_path: "logs/live_real_mvp.log"
  log_level: "INFO"

vision:
  enabled: true

live:
  dry_run: false
  foreground_only: true
  enable_real_input: false
  enable_real_clicks: false
  enable_real_keys: false
  window_title: "BrokenRanks"
  capture_region: [0, 0, 0, 0]
  spawn_roi: [80, 40, 1450, 860]
  hp_bar_roi: [40, 40, 220, 18]
  condition_bar_roi: [40, 68, 220, 18]
  combat_indicator_roi: [560, 620, 160, 60]
  reward_roi: [500, 120, 260, 120]
  debug_directory: "data/live_real_debug"
  save_frames: true
  save_overlays: true
  stall_timeout_s: 1.0
  dry_run_profile: "single_spot_mvp"
  perception_confidence_threshold: 0.75
  occupied_confidence_threshold: 0.75
  merge_distance_px: 28
  sample_frames_directory: "assets/live/sample_frames/raw"
  benchmark_dataset_directory: "assets/live/sample_frames"
  scene_profile_path: "assets/live/scenes/single_spot_scene.json"
  scene_zone_overlay_visible: false
  scene_calibration_offset_xy: [0, 0]
  scene_reference_anchor_mode: "frame_center"
  scene_reference_anchor_xy: [960, 520]
  mobs_template_directory: "assets/live/templates/mobs"
  occupied_template_directory: "assets/live/templates/occupied"
  template_match_stride_px: 6
  template_rotations_deg: [0, 90, 180, 270]
  marker_color_mode: "yellow"
  marker_min_red: 150
  marker_min_green: 110
  marker_red_green_delta: 20
  marker_green_blue_delta: 8
  marker_red_blue_delta: 15
  marker_red_green_balance_delta: 70
  marker_min_blob_pixels: 4
  marker_max_blob_pixels: 180
  marker_min_width_px: 4
  marker_max_width_px: 28
  marker_min_height_px: 4
  marker_max_height_px: 28
  marker_min_fill_density: 0.04
  marker_max_fill_density: 0.95
  marker_dark_core_max_rgb: 135
  marker_min_dark_core_ratio: 0.00
  marker_confidence_threshold: 0.30
  rescue_upper_scan_confidence_threshold: 0.74
  rescue_upper_scan_stride_px: 8
  rescue_pseudo_marker_size_px: 8
  rescue_pseudo_marker_offset_y_px: 10
  combat_indicator_min_red: 170
  combat_indicator_red_green_delta: 35
  combat_indicator_red_blue_delta: 25
  combat_indicator_min_ratio: 0.01
  rest_resource_sample_count: 5
  rest_resource_sample_interval_s: 0.10
  rest_resource_min_confidence: 0.65
  rest_resource_max_ticks: 8
  rest_resource_growth_min_delta: 0.01
  rest_resource_warning_spread_threshold: 0.08
  rest_resource_stall_warning_ticks: 2
  swords_min_green: 120
  swords_green_red_delta: 20
  swords_green_blue_delta: 10
  swords_min_blob_pixels: 2
  swords_max_blob_pixels: 220
  swords_confidence_threshold: 0.25
  occupied_template_match_min_green_ratio: 0.01
  occupied_local_roi_width_px: 64
  occupied_local_roi_height_px: 72
  occupied_local_roi_offset_y_px: -42
  confirmation_roi_width_px: 88
