app:
  name: "botlab-live-shadow-session"
  mode: "live"

cycle:
  interval_s: 45.0
  prepare_before_s: 5.0
  ready_before_s: 1.0
  ready_after_s: 1.0
  verify_timeout_s: 0.5
  recover_timeout_s: 2.0

combat:
  low_hp_threshold: 0.35
  rest_start_threshold: 0.50
  rest_stop_threshold: 0.90
  default_profile_name: "basic_farmer"

telemetry:
  sqlite_path: "data/telemetry/live_shadow_session.sqlite3"
  log_path: "logs/live_shadow_session.log"
  log_level: "INFO"

vision:
  enabled: true

live:
  dry_run: false
  shadow_session_enabled: true
  foreground_only: true
  enable_real_input: false
  enable_real_clicks: false
  enable_real_keys: false
  window_title: "BrokenRanks"
  capture_region: [0, 0, 0, 0]
  spawn_roi: [80, 40, 1450, 860]
  hp_bar_roi: [40, 40, 220, 18]
  condition_bar_roi: [40, 68, 220, 18]
  combat_indicator_roi: [560, 620, 160, 60]
  reward_roi: [500, 120, 260, 120]
  debug_directory: "data/live_shadow_session_debug"
  save_frames: true
  save_overlays: true
  stall_timeout_s: 1.0
  dry_run_profile: "single_spot_mvp"
  perception_confidence_threshold: 0.80
